<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <title>Espaçamento CSS</title>
  </head>
  <body>

    <label for="inputPadding">Padding:</label>
    <input type="range" id="inputPadding" min="0" max="80" value="20"><br><br>

    <label for="inputBorder">Border:</label>
    <input type="range" id="inputBorder" min="0" max="20" value="2"><br><br>

    <label for="inputMargin">Margin:</label>
    <input type="range" id="inputMargin" min="0" max="80" value="20"><br><br>

    <div id="caixa" style="padding: 20px; border: 2px solid black; margin: 20px;">
      Conteúdo da div
    </div>

    <script>
      const caixa = document.getElementById('caixa');

      document.getElementById('inputPadding').addEventListener('input', function () {
        caixa.style.padding = this.value + 'px';
      });

      document.getElementById('inputBorder').addEventListener('input', function () {
        caixa.style.border = this.value + 'px solid black';
      });

      document.getElementById('inputMargin').addEventListener('input', function () {
        caixa.style.margin = this.value + 'px';
      });
    </script>

  </body>
</html>
