<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <title>Display CSS</title>
  </head>
  <body>

    <h2>block</h2>
    <div style="display: block; margin: 10px; padding: 10px; border: 1px solid black;">
      Elemento block: ocupa a linha inteira
    </div>

    <h2>inline</h2>
    <span style="display: inline; margin: 10px; padding: 10px; border: 1px solid black;">
      Elemento inline: ocupa só o espaço do conteúdo
    </span>

    <h2>inline-block</h2>
    <div style="display: inline-block; margin: 10px; padding: 10px; border: 1px solid black;">
      Elemento inline-block: fica na linha mas aceita margin e padding
    </div>

  </body>
</html>
