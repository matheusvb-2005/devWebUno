<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Dev. Web - 20/03</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="container" style="max-width: 420px;">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h2 class="text-center mb-4 titulo-cursivo">Dev. Web - 20/03</h2>

          <form id="formCadastro">
            <div class="mb-3">
              <label for="nome" class="form-label">Nome de usuario</label>
              <input type="text" class="form-control" id="nome" placeholder="Seu nome" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="mb-3">
              <label for="senha" class="form-label">Senha</label>
              <input type="password" class="form-control" id="senha" placeholder="Crie uma senha" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Cadastrar</button>
          </form>

          <p class="text-center mt-3 mb-0">
            Ja tem conta? <a href="login.html">Faca login</a>
          </p>
        </div>
      </div>
    </div>

    <script>
      if (localStorage.getItem('tema') === 'dark') {
        document.documentElement.classList.add('dark');
      }

      document.getElementById('formCadastro').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('Cadastro realizado com sucesso!');
        window.location.href = 'login.html';
      });
    </script>
  </body>
</html>
