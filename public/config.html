<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuracoes | Dev. Web - 20/03</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand navbar-light bg-white shadow-sm">
      <div class="container">
        <a class="navbar-brand titulo-cursivo" href="index.html">Dev. Web - 20/03</a>
        <div class="d-flex align-items-center gap-2">
          <button id="btn-tema" class="btn btn-outline-secondary btn-sm" type="button" title="Modo noturno">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
            </svg>
          </button>
          <a href="index.html" class="btn btn-outline-secondary btn-sm">Voltar</a>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <h4 class="mb-4">Configuracoes do Perfil</h4>

          <form id="formConfig">
            <div class="mb-3">
              <label for="cfg-nome" class="form-label">Nome</label>
              <input type="text" class="form-control" id="cfg-nome" placeholder="Seu nome">
            </div>
            <div class="mb-3">
              <label for="cfg-foto" class="form-label">URL da foto</label>
              <input type="url" class="form-control" id="cfg-foto" placeholder="https://exemplo.com/foto.jpg">
            </div>
            <div class="mb-3">
              <label for="cfg-bio" class="form-label">Bio</label>
              <textarea class="form-control" id="cfg-bio" rows="3" placeholder="Fale sobre voce"></textarea>
            </div>
            <div class="mb-3">
              <label for="cfg-interesses" class="form-label">Interesses (separados por virgula)</label>
              <input type="text" class="form-control" id="cfg-interesses" placeholder="Games, Programação, Leitura">
            </div>
            <div class="mb-4">
              <label class="form-label">Tema</label>
              <select class="form-select" id="cfg-tema">
                <option value="light">Claro</option>
                <option value="dark">Escuro</option>
              </select>
            </div>
            <button type="submit" class="btn btn-dark w-100">Salvar</button>
          </form>

        </div>
      </div>
    </div>

    <script>
      // Modo noturno
      if (localStorage.getItem('tema') === 'dark') {
        document.documentElement.classList.add('dark');
      }

      document.getElementById('btn-tema').addEventListener('click', function() {
        document.documentElement.classList.toggle('dark');
        var tema = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        localStorage.setItem('tema', tema);
        document.getElementById('cfg-tema').value = tema;
      });

      // Carregar dados salvos
      var campos = {
        'cfg-nome': 'usuario',
        'cfg-foto': 'foto',
        'cfg-bio': 'bio',
        'cfg-interesses': 'interesses'
      };

      Object.keys(campos).forEach(function(id) {
        var valor = localStorage.getItem(campos[id]);
        if (valor) document.getElementById(id).value = valor;
      });

      var temaSalvo = localStorage.getItem('tema') || 'light';
      document.getElementById('cfg-tema').value = temaSalvo;

      // Salvar
      document.getElementById('formConfig').addEventListener('submit', function(e) {
        e.preventDefault();

        Object.keys(campos).forEach(function(id) {
          localStorage.setItem(campos[id], document.getElementById(id).value);
        });

        var tema = document.getElementById('cfg-tema').value;
        localStorage.setItem('tema', tema);

        if (tema === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }

        alert('Configuracoes salvas!');
      });
    </script>
  </body>
</html>
