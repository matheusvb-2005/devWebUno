<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | Desenvolvimento Web</title>
    <meta name="description" content="Página de perfil com formulário de depoimentos.">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <header>
      <h1>Meu Perfil</h1>
    </header>

    <main>

      <section>
        <h2>Sobre mim</h2>
        <img src="https://placehold.co/120x120" alt="Foto de perfil">
        <p><strong>Nome:</strong> Matheus</p>
        <p>Estudante de Ciência da Computação na Unochapecó (atividade da disciplina de Desenvolvimento Web).</p>
      </section>

      <section>
        <h2>Deixe o seu depoimento</h2>
        <form id="formDepoimento">
          <label for="nome">Nome:</label><br>
          <input type="text" id="nome" name="nome" placeholder="Seu nome"><br><br>

          <label for="mensagem">Mensagem:</label><br>
          <textarea id="mensagem" name="mensagem" placeholder="Sua mensagem"></textarea><br><br>

          <button type="submit">Enviar</button>
        </form>
      </section>

      <section>
        <h2>Depoimentos</h2>
        <div id="lista"></div>
      </section>

    </main>

    <script>
      function renderizarDepoimento(depoimento) {
        const container = document.getElementById('lista');
        const div = document.createElement('div');
        div.textContent = depoimento.nome + ': ' + depoimento.mensagem;
        container.appendChild(div);
      }

      fetch('/depoimentos')
        .then(function(res) { return res.json(); })
        .then(function(dados) {
          dados.forEach(renderizarDepoimento);
        });

      const form = document.getElementById('formDepoimento');
      form.addEventListener('submit', function(event) {
        event.preventDefault();

        const nome = document.getElementById('nome').value;
        const mensagem = document.getElementById('mensagem').value;

        fetch('/depoimentos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome: nome, mensagem: mensagem })
        })
          .then(function(res) { return res.json(); })
          .then(function(novo) {
            renderizarDepoimento(novo);
            form.reset();
          });
      });
    </script>

  </body>
</html>
