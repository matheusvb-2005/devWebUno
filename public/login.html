<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dev. Web - 20/03</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="container" style="max-width: 420px;">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h2 class="text-center mb-4 titulo-cursivo">Dev. Web - 20/03</h2>

          <form id="formLogin">
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="mb-3">
              <label for="senha" class="form-label">Senha</label>
              <input type="password" class="form-control" id="senha" placeholder="Sua senha" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Entrar</button>
          </form>

          <p class="text-center mt-3 mb-0">
            Não tem conta? <a href="cadastro.html">Cadastre-se</a>
          </p>
        </div>
      </div>
    </div>

    <script>
      // Modo noturno — lê do localStorage
      if (localStorage.getItem('tema') === 'dark') {
        document.documentElement.classList.add('dark');
      }

      // Login simulado
      document.getElementById('formLogin').addEventListener('submit', function(e) {
        e.preventDefault();
        var email = document.getElementById('email').value;
        if (email) {
          localStorage.setItem('usuario', email.split('@')[0]);
        }
        window.location.href = 'index.html';
      });
    </script>
  </body>
</html>
